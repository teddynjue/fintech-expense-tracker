<!DOCTYPE html>
<html>
<head>

<title>FinTrack</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">

<span class="navbar-brand">FinTrack</span>

<div>

{% if session.get("user_id") %}

<a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
<a href="/converter" class="btn btn-outline-light btn-sm">Converter</a>
<a href="/logout" class="btn btn-danger btn-sm">Logout</a>

{% else %}

<a href="/login" class="btn btn-outline-light btn-sm">Login</a>
<a href="/register" class="btn btn-success btn-sm">Register</a>

{% endif %}

</div>

</nav>

<div class="container mt-4">

{% block content %}{% endblock %}

</div>

</body>
</html>
